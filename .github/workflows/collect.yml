name: 定时采集竞品数据

# 触发方式：
#   1) 定时：每天 01:00 UTC（= 北京时间 09:00）。币对每天采集；App 版本仅周一采集。
#   2) 手动：在 GitHub 的 Actions 页面点 "Run workflow"，App 与币对都会采集（用于测试）。
on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

# 允许工作流把新数据和页面提交回仓库
permissions:
  contents: write

# 同一时间只跑一个，避免两次提交打架
concurrency:
  group: collect
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库
        uses: actions/checkout@v5

      - name: 安装 Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      # 币对：每天都采集；手动触发时也采集。
      # 已知部分交易所会因地区封锁失败（如 Bybit 封锁数据中心 IP）：
      # 用 "|| echo" 吞掉非零退出码，不让整个流程报错；失败详情见上方日志与页面，
      # 成功的交易所数据照常保存。
      - name: 采集交易对（每天）
        run: node scripts/collect-pairs.js || echo "⚠️ 部分交易所采集失败（详见上方日志），继续。"

      # App 版本：仅在周一采集；手动触发时也采集
      # date -u +%u 返回星期几，1 = 周一
      - name: 采集 App 版本（每周一）
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "$(date -u +%u)" = "1" ]; then
            node scripts/collect.js || echo "⚠️ 部分 App 采集失败（详见上方日志），继续。"
          else
            echo "今天不是周一，跳过 App 版本采集。"
          fi

      - name: 重新生成展示页面
        run: |
          cd frontend
          npm install
          npm run artifact

      - name: 提交更新（若有变化）
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data docs/index.html frontend/src/data/snapshots.ts
          if git diff --staged --quiet; then
            echo "没有数据变化，无需提交。"
          else
            git commit -m "chore: 自动采集数据并更新页面 ($(date -u +%Y-%m-%d))"
            git push
          fi
